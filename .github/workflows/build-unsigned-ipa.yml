name: Build Unsigned iOS IPA

on:
  workflow_dispatch:

jobs:
  unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS app without signing
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/OreBeats.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package unsigned IPA
        working-directory: ios/App
        run: |
          mkdir -p build/Payload
          cp -R build/OreBeats.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          /usr/bin/zip -r OreBeats-unsigned.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OreBeats-unsigned-ipa
          path: ios/App/build/OreBeats-unsigned.ipa
